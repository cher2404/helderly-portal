<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .bar1 { animation: barPulse 2.4s ease-in-out infinite; transform-origin: 7px center; }
        .bar2 { animation: barPulse 2.4s ease-in-out 0.2s infinite; transform-origin: 7px center; }
        .bar3 { animation: barPulse 2.4s ease-in-out 0.4s infinite; transform-origin: 7px center; }
        @keyframes barPulse {
          0%, 100% { transform: scaleX(1); opacity: 1; }
          45% { transform: scaleX(0.35); opacity: 0.4; }
          70% { transform: scaleX(1); opacity: 1; }
        }
      }
    </style>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="14" rx="7" fill="white" opacity="0.06"/>
  <rect class="bar1" x="7" y="10" width="18" height="3" rx="1.5" fill="white"/>
  <rect class="bar2" x="7" y="15" width="12" height="3" rx="1.5" fill="white" opacity="0.7"/>
  <rect class="bar3" x="7" y="20" width="15" height="3" rx="1.5" fill="white" opacity="0.4"/>
</svg>
